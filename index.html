*{

body{

padding:20px;
color:white;
}

.header{

padding:30px;
background:rgba(255,255,255,.1);
backdrop-filter:blur(15px);
border-radius:20px;
margin-bottom:20px;
}

.header h1{

color:#00d4ff;
}

.header p{
font-size:18px;

}

.dashboard{

.card{

padding:15px;
border:none;
border-radius:15px;
font-size:16px;
}

.table-container{
background:rgba(255,255,255,.1);
backdrop-filter:blur(15px);
padding:20px;
border-radius:20px;
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#00d4ff;
color:black;
padding:15px;
}

td{
padding:12px;
border-bottom:1px solid rgba(255,255,255,.2);
}

tr:hover{
background:rgba(255,255,255,.08);
}

.leader{
color:#00ff99;
font-weight:bold;
}

.footer{
text-align:center;
margin-top:20px;
padding:20px;
}

</head>

function loadData(){

const body=document.getElementById("tableBody");

body.innerHTML="";

let currentTeam=0;

students.forEach((s,i)=>{

if(currentTeam!==s.team){

body.innerHTML+=`

<tr style="background:#00ffff;color:black;">
<td colspan="6"
style="
font-size:22px;
font-weight:bold;
text-align:center;
padding:15px;">
TEAM ${s.team}
</td>
</tr>

<tr style="background:#0099cc;color:white;font-weight:bold;">
<th>S.No</th>
<th>Team</th>
<th>Name</th>
<th>Hall Ticket</th>
<th>Group</th>
<th>Role</th>
</tr>

`;

currentTeam=s.team;

}

body.innerHTML+=`

<tr>

<td>${i+1}</td>

<td>${s.team}</td>

<td>${s.name}</td>

<td>${s.hall}</td>

<td>${s.group}</td>

<td class="${s.role==='Team Leader'?'leader':''}">
${s.role}
</td>

</tr>

`;

});

document.getElementById("studentCount").innerHTML=students.length;

}
loadData();

document.getElementById("search").addEventListener("keyup",function(){

let value=this.value.toLowerCase();

document.querySelectorAll("#tableBody tr").forEach(row=>{

row.style.display=row.innerText.toLowerCase().includes(value)
?"":"none";

});

});
